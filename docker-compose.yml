# Default: docker compose up -d (sobe apenas Redis). Para Postgres em Docker (porta host 5433): docker compose --profile optional-db up -d
services:
  redis:
    image: redis:alpine
    container_name: alphatoca_redis
    ports:
      - "6380:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: alphatoca_postgres
    profiles: ["optional-db"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
